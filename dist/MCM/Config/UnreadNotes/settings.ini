;
; UnreadNotes — Configuration
;
; Controls how read notes and holotapes appear in the Pip-Boy inventory.
;
; ---------------------------------------------------------------------------
; Config precedence chain (first file with a setting wins):
;   1. Data/MCM/Settings/UnreadNotes.ini        — MCM-managed user settings
;   2. Data/F4SE/Plugins/UnreadNotes.ini        — manual override file
;   3. Data/MCM/Config/UnreadNotes/settings.ini — shipped defaults
;
; To change a setting:
;   - With MCM installed: use the MCM in-game menu. Changes are saved to (1)
;     automatically.
;   - Without MCM: edit (2). It is auto-populated with the shipped defaults
;     on first run, so you can change values directly there. (2) is preserved
;     across mod updates and is the safest place for your customisations.
;
; Do not edit (3) directly — that is the shipped reference file and gets
; refreshed on each mod update, overwriting any changes made to it.
;
; New settings added in future releases appear in (3) automatically. Your
; customisations in (1) or (2) are never touched by mod updates.
; ---------------------------------------------------------------------------
;

[Display]

; Brightness of read items (0-100).
; 100 = full brightness (no change), 50 = half brightness, 0 = invisible.
; Default: 50
iReadBrightness=50

; Text appended to read item names. The mod adds a single space before this
; automatically, so just enter the suffix you want — no leading space needed.
; Set blank for no suffix. ASCII only — the Pip-Boy font doesn't support unicode.
; Default: (Read)
sSuffix=(Read)

; Text appended to MARKED item names (those flagged with the mark hotkey —
; stay bright and are excluded from auto-mark-as-read).
; Same rules as sSuffix.
; Default: (*)
sMarkSuffix=(*)

[Input]

; Toggle read/unread on the selected Pip-Boy item with a keypress.
; Value is the decimal scan code from the Fallout CK wiki's scan-code table.
; 0 = disabled (default — no key is claimed until you opt in).
; Reference: https://falloutck.uesp.net/wiki/DirectX_Scan_Codes
; Suggested unused keys: 189 ("-"), 187 ("="), 220 ("\")
sToggleKey=0

; Mark/unmark the selected item. Marked items stay bright, get sMarkSuffix,
; and are skipped by auto-mark-as-read. Useful for config holotapes and
; notes whose FormIDs are reused across different in-game contexts.
; Same scan-code reference as sToggleKey; pick a different unused key.
; 0 = disabled (default).
sMarkKey=0

[Debug]

; Logging level. 0 = minimal, 1 = normal, 2 = debug (includes perf stats).
; Default: 1
iLogLevel=1

; Set to 1 and open Pip-Boy to trigger. Auto-resets to 0 after use.
bResetAll=0
bMarkAllRead=0
